# config/integrity.yaml
plugins:
  graph_extension:
    enabled: true
  graph_lint:
    enabled: true
    thresholds:
      vulture_min_confidence: 80      # passed to vulture --min-confidence
      density_drop_pct: 25            # >25% WoW drop → WARN
      orphan_growth_pct: 20           # >20% WoW growth → WARN
      module_min_nodes: 5             # density_drop ignores smaller modules
      snapshot_retention_days: 30     # prune older snapshots
    ignored_dead_code: []             # list of node_ids
    excluded_paths:
      - "tests/**"
      - "**/migrations/**"
      - "**/__pycache__/**"
  doc_audit:
    enabled: true
    thresholds:
      stale_days: 90
    coverage_required:
      - dev-setup.md
      - testing.md
      - gotchas.md
      - skill-creation.md
      - log.md
    seed_docs:
      - CLAUDE.md
    doc_roots:
      - "docs/**/*.md"
      - "knowledge/**/*.md"
      - "*.md"
    excluded_paths:
      - "reference/**"
      - "node_modules/**"
      - "**/__pycache__/**"
      - "integrity-out/**"
      - "docs/health/**"
      - "docs/superpowers/**"
    claude_ignore_file: ".claude-ignore"
    rename_lookback: "30.days.ago"
    disabled_rules: []
