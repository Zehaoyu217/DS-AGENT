level: 1
name: "Basic Rendering"
prompt: "Show me the monthly transaction volume and total amount for 2025 as a bar chart. Also show the top 10 customers by total deposits as a table. Finally, draw the relationship between the 5 tables as a mermaid ERD."
dimensions:
  chart_correctness:
    weight: 0.3
    type: llm_judge
    criteria:
      A: "Formatted amounts, clear title, axes labeled, months in correct order"
      B: "Chart renders with 12 months, values roughly correct"
      C: "Bar chart present with some labels"
  table_correctness:
    weight: 0.3
    type: hybrid
    deterministic:
      - "output contains exactly 10 customer rows"
      - "rows sorted descending by deposit amount"
    criteria:
      A: "Correct ranking order, properly formatted currency, clean alignment"
      B: "10 rows present, customer names and amounts visible"
      C: "Table with some customer rows and amounts present"
  mermaid_erd:
    weight: 0.2
    type: deterministic
    criteria:
      A: "Column names in entities, PK/FK marked, clean layout"
      B: "Correct FK relationships, correct cardinality notation"
      C: "Renders without syntax error, shows 5 tables"
  process_quality:
    weight: 0.2
    type: llm_judge
    criteria:
      A: "Efficient queries, no redundant calls"
      B: "Reasonable query design, not SELECT *"
      C: "Ran queries and produced output"
grading:
  A: 0.85
  B: 0.60
  C: 0.40
